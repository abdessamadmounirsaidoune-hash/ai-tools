<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DZStudy AI</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
margin:0;
background:#f5f7fb;
}

header{
background:linear-gradient(135deg,#3b6cff,#6b8cff);
color:white;
text-align:center;
padding:50px 20px;
}

header h1{
margin:0;
font-size:40px;
}

header p{
margin-top:10px;
font-size:18px;
opacity:.9;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,.12);
}

.card h3{
margin:10px 0;
font-size:20px;
}

.card p{
font-size:14px;
color:#666;
}

.icon{
font-size:35px;
}

footer{
text-align:center;
padding:30px;
color:#777;
}

.dark{
background:#121212;
color:white;
}

.dark .card{
background:#1e1e1e;
color:white;
}

.toggle{
position:fixed;
left:20px;
bottom:20px;
background:#3b6cff;
color:white;
border:none;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<h1>DZStudy AI</h1>

<p>منصة ذكاء اصطناعي لمساعدة الطلاب الجزائريين في الدراسة</p>

</header>

<div class="container">

<h2 style="text-align:center;margin-bottom:30px;">الأدوات</h2>

<div class="tools">

<div class="card" onclick="go('chat.html')">
<div class="icon">💬</div>
<h3>الدردشة الذكية</h3>
<p>اسأل أي سؤال دراسي</p>
</div>

<div class="card" onclick="go('research.html')">
<div class="icon">📝</div>
<h3>إنشاء بحث</h3>
<p>إنشاء بحوث مدرسية</p>
</div>

<div class="card" onclick="go('summary.html')">
<div class="icon">✂️</div>
<h3>تلخيص النص</h3>
<p>تلخيص الدروس الطويلة</p>
</div>

<div class="card" onclick="go('exercise.html')">
<div class="icon">📷</div>
<h3>حل التمارين</h3>
<p>رفع صورة التمرين</p>
</div>

<div class="card" onclick="go('lesson.html')">
<div class="icon">📚</div>
<h3>شرح الدروس</h3>
<p>شرح أي درس بسهولة</p>
</div>

</div>

</div>

<footer>

© DZStudy AI

</footer>

<button class="toggle" onclick="toggleDark()">🌙 الوضع الليلي</button>

<script>

function go(page){

window.location.href=page

}

function toggleDark(){

document.body.classList.toggle("dark")

}

</script>

</body>

</html>
