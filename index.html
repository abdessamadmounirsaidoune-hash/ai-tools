<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZStudy AI</title>

<style>

body{
font-family:Arial;
background:#f3f5fb;
margin:0;
direction:rtl;
}

header{
background:linear-gradient(135deg,#2f63ff,#1a3dbb);
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

button{
background:#2f63ff;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.result{
background:#eef1f7;
padding:15px;
border-radius:8px;
margin-top:15px;
white-space:pre-line;
}

</style>
</head>

<body>

<header>
<h1>DZStudy AI</h1>
<p>مساعدة الطلبة الجزائريين بالذكاء الاصطناعي</p>
</header>

<div class="container">

<div class="card">
<h2>إنشاء بحث</h2>
<input id="topic">
<button onclick="research()">إنشاء البحث</button>
<div id="researchResult" class="result"></div>
</div>

<div class="card">
<h2>تلخيص نص</h2>
<textarea id="text"></textarea>
<button onclick="summarize()">تلخيص</button>
<div id="summaryResult" class="result"></div>
</div>

<div class="card">
<h2>حل سؤال</h2>
<input id="question">
<button onclick="answer()">حل السؤال</button>
<div id="answerResult" class="result"></div>
</div>

</div>

<script>

async function askAI(prompt){

const url="https://text.pollinations.ai/"+encodeURIComponent(prompt)

const response=await fetch(url)

const text=await response.text()

return text

}

async function research(){

let topic=document.getElementById("topic").value

document.getElementById("researchResult").innerText="جاري الإنشاء..."

let result=await askAI("اكتب بحثا مدرسيا بمقدمة وعرض وخاتمة حول "+topic)

document.getElementById("researchResult").innerText=result

}

async function summarize(){

let text=document.getElementById("text").value

document.getElementById("summaryResult").innerText="جاري التلخيص..."

let result=await askAI("لخص النص التالي: "+text)

document.getElementById("summaryResult").innerText=result

}

async function answer(){

let q=document.getElementById("question").value

document.getElementById("answerResult").innerText="جاري الحل..."

let result=await askAI("أجب عن السؤال التالي للطلاب: "+q)

document.getElementById("answerResult").innerText=result

}

</script>

</body>
</html>
