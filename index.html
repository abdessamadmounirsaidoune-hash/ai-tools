<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DZStudy | منصة الطالب الذكية</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f3f6fb;
direction:rtl;
}

header{
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h2{
margin-top:0;
}

input,textarea{
width:95%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#1e3a8a;
}

.icon{
font-size:24px;
color:#2563eb;
margin-bottom:10px;
}

.result{
margin-top:10px;
background:#f8fafc;
padding:15px;
border-radius:8px;
white-space:pre-line;
}

footer{
text-align:center;
padding:20px;
color:#777;
}

</style>
</head>

<body>

<header>

<h1>DZStudy</h1>
<p>منصة الطالب الجزائري للبحوث والواجبات والدراسة</p>

</header>

<div class="container">

<!-- توليد بحث -->

<div class="card">

<div class="icon"><i class="fa-solid fa-lightbulb"></i></div>

<h2>توليد فكرة بحث</h2>

<input id="researchTopic" placeholder="اكتب موضوع البحث">

<button onclick="generateResearch()">توليد</button>

<div id="researchResult" class="result"></div>

</div>


<!-- تلخيص النص -->

<div class="card">

<div class="icon"><i class="fa-solid fa-file-lines"></i></div>

<h2>تلخيص النصوص والبحوث</h2>

<textarea id="summaryText" rows="5" placeholder="ضع النص هنا"></textarea>

<input type="file" id="summaryImage" accept="image/*">

<button onclick="summarizeText()">تلخيص</button>

<div id="summaryResult" class="result"></div>

</div>


<!-- حل الواجبات -->

<div class="card">

<div class="icon"><i class="fa-solid fa-book"></i></div>

<h2>حل الواجبات والأسئلة</h2>

<textarea id="questionText" rows="4" placeholder="اكتب السؤال"></textarea>

<input type="file" id="questionImage" accept="image/*">

<button onclick="solveQuestion()">حل السؤال</button>

<div id="questionResult" class="result"></div>

</div>


<!-- شرح الدروس -->

<div class="card">

<div class="icon"><i class="fa-solid fa-graduation-cap"></i></div>

<h2>شرح درس</h2>

<input id="lessonText" placeholder="اكتب اسم الدرس">

<button onclick="explainLesson()">شرح</button>

<div id="lessonResult" class="result"></div>

</div>


<!-- تحويل الصوت -->

<div class="card">

<div class="icon"><i class="fa-solid fa-microphone"></i></div>

<h2>تحويل الصوت إلى كتابة</h2>

<button onclick="startVoice()">ابدأ التسجيل</button>

<textarea id="voiceResult" rows="3" placeholder="سيظهر النص هنا"></textarea>

</div>


<!-- قراءة النص من الصورة -->

<div class="card">

<div class="icon"><i class="fa-solid fa-image"></i></div>

<h2>قراءة النص من صورة</h2>

<input type="file" id="ocrImage" accept="image/*">

<button onclick="readImage()">قراءة النص</button>

<div id="ocrResult" class="result"></div>

</div>

</div>

<footer>

DZStudy 2026

</footer>


<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

function generateResearch(){

let topic=document.getElementById("researchTopic").value;

let text="مقدمة:\nيعد موضوع "+topic+" من المواضيع المهمة.\n\n"+
"إشكالية البحث:\nما أهمية "+topic+" وتأثيره؟\n\n"+
"الأهداف:\n- فهم المفهوم\n- دراسة التأثير\n\n"+
"الخاتمة:\nيمثل "+topic+" مجالاً مهماً للدراسة.";

document.getElementById("researchResult").innerText=text;

}

function summarizeText(){

let text=document.getElementById("summaryText").value;

let summary=text.substring(0,200)+"...";

document.getElementById("summaryResult").innerText=summary;

}

function solveQuestion(){

let question=document.getElementById("questionText").value;

let answer="تحليل السؤال:\n"+question+"\n\nالحل المقترح:\nيمكن تحليل السؤال وتقسيمه إلى خطوات ثم الوصول للحل.";

document.getElementById("questionResult").innerText=answer;

}

function explainLesson(){

let lesson=document.getElementById("lessonText").value;

let explain="شرح مبسط لدرس "+lesson+" :\nهذا الدرس يشرح المفاهيم الأساسية المرتبطة بالموضوع.";

document.getElementById("lessonResult").innerText=explain;

}

function startVoice(){

let recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();

recognition.lang="ar";

recognition.start();

recognition.onresult=function(event){

document.getElementById("voiceResult").value=event.results[0][0].transcript;

}

}

function readImage(){

let file=document.getElementById("ocrImage").files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(){

Tesseract.recognize(reader.result,"ara+eng").then(function(result){

document.getElementById("ocrResult").innerText=result.data.text;

});

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
