<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DZStudy AI</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#f3f6fd;
direction:rtl;
}

header{
background:linear-gradient(135deg,#2f63ff,#3f7cff);
color:white;
text-align:center;
padding:60px 20px;
}

header h1{
font-size:40px;
margin:0;
}

header p{
opacity:0.9;
margin-top:10px;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.tool{
background:white;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.tool:hover{
transform:translateY(-5px);
}

.tool h3{
margin:10px 0;
}

footer{
text-align:center;
padding:30px;
color:#777;
}

</style>

</head>

<body>

<header>

<h1>DZStudy AI</h1>

<p>منصة ذكاء اصطناعي لمساعدة الطلاب الجزائريين في الدراسة</p>

</header>

<div class="container">

<h2 style="text-align:center">الأدوات</h2>

<div class="tools">

<div class="tool">
<h3>💬 الدردشة الذكية</h3>
<p>اسأل أي سؤال دراسي</p>
</div>

<div class="tool">
<h3>📷 حل التمارين</h3>
<p>ارفع صورة التمرين</p>
</div>

<div class="tool">
<h3>📝 إنشاء بحث</h3>
<p>إنشاء بحوث مدرسية</p>
</div>

<div class="tool">
<h3>✂️ تلخيص النص</h3>
<p>تلخيص الدروس الطويلة</p>
</div>

<div class="tool">
<h3>📄 تلخيص PDF</h3>
<p>رفع ملف وتلخيصه</p>
</div>

<div class="tool">
<h3>📚 شرح الدروس</h3>
<p>شرح أي درس بسهولة</p>
</div>

</div>

</div>

<footer>

© DZStudy AI

</footer>

</body>
</html>
