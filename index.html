<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مولد أفكار مشاريع بالذكاء الاصطناعي</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding-top:100px;
}

input{
padding:10px;
width:250px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
background:#28a745;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:22px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>مولد أفكار مشاريع بالذكاء الاصطناعي</h1>

<p>اكتب مجال المشروع</p>

<input id="idea" placeholder="مثلا: التجارة">

<br><br>

<button onclick="generate()">توليد فكرة</button>

<p id="result"></p>

<script>

async function generate(){

let prompt=document.getElementById("idea").value;

document.getElementById("result").innerText="...جاري التفكير";

let response=await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-large",
{
method:"POST",

headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},

body:JSON.stringify({
inputs:"اعطني فكرة مشروع مربح في مجال "+prompt
})

});

let data=await response.json();

document.getElementById("result").innerText=data[0].generated_text;

}

</script>

</body>
</html>
