<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DZStudy AI</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f7fb;
direction:rtl;
}

header{
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input,textarea{
width:95%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:15px;
background:#eef2f7;
padding:15px;
border-radius:8px;
white-space:pre-line;
}
</style>

</head>

<body>

<header>
<h1>DZStudy AI</h1>
<p>مساعدة الطلبة الجزائريين بالدراسة والبحوث</p>
</header>

<div class="container">

<div class="card">

<h2>إنشاء بحث</h2>

<input id="researchTopic" placeholder="اكتب موضوع البحث">

<button onclick="generateResearch()">إنشاء البحث</button>

<div id="researchResult" class="result"></div>

</div>


<div class="card">

<h2>تلخيص النصوص</h2>

<textarea id="summaryText" rows="5"></textarea>

<button onclick="summarizeText()">تلخيص</button>

<div id="summaryResult" class="result"></div>

</div>


<div class="card">

<h2>حل سؤال</h2>

<textarea id="questionText" rows="4"></textarea>

<button onclick="solveQuestion()">حل السؤال</button>

<div id="questionResult" class="result"></div>

</div>

</div>

<script>

function generateResearch(){

let topic=document.getElementById("researchTopic").value;

let result=document.getElementById("researchResult");

result.innerText="جاري إنشاء البحث...";

setTimeout(()=>{

result.innerText=
"مقدمة:\n"+
"يعد موضوع "+topic+" من المواضيع المهمة في العصر الحديث.\n\n"+
"الشرح:\n"+
"يؤثر "+topic+" في العديد من المجالات مثل الاقتصاد والمجتمع والتكنولوجيا.\n\n"+
"الخاتمة:\n"+
"يمكن القول إن "+topic+" له دور كبير في تطوير المجتمعات.";

},1500)

}


function summarizeText(){

let text=document.getElementById("summaryText").value;

let result=document.getElementById("summaryResult");

result.innerText="جاري التلخيص...";

setTimeout(()=>{

result.innerText=text.substring(0,200)+" ...";

},1000)

}


function solveQuestion(){

let q=document.getElementById("questionText").value;

let result=document.getElementById("questionResult");

result.innerText="جاري الحل...";

setTimeout(()=>{

result.innerText=
"تحليل السؤال:\n"+q+
"\n\nالحل المقترح:\n"+
"يمكن حل هذا السؤال باتباع الخطوات المناسبة وتحليل المعطيات.";

},1500)

}

</script>

</body>
</html>
