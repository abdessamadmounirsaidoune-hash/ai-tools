<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DZStudy | مساعد الطلبة الجزائريين</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
text-align:center;
}

header{
background:#2563eb;
color:white;
padding:25px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
margin:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,textarea{
width:90%;
padding:12px;
font-size:16px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.result{
margin-top:15px;
white-space:pre-line;
font-size:17px;
}

footer{
padding:20px;
color:#777;
}

</style>

</head>

<body>

<header>

<h1>DZStudy</h1>

<p>موقع يساعد الطلبة الجزائريين في البحوث والواجبات</p>

</header>

<div class="container">

<div class="card">

<h2>إنشاء فكرة بحث</h2>

<input id="topic" placeholder="مثال: الطاقة الشمسية">

<br>

<button onclick="generate()">توليد فكرة</button>

<div id="research" class="result"></div>

</div>

<div class="card">

<h2>تلخيص النصوص</h2>

<textarea id="text" rows="5" placeholder="ضع النص هنا"></textarea>

<br>

<button onclick="summarize()">تلخيص</button>

<div id="summary" class="result"></div>

</div>

</div>

<footer>

DZStudy 2026

</footer>

<script>

function generate(){

let topic=document.getElementById("topic").value;

let result="مقدمة:\nيعد موضوع "+topic+" من المواضيع المهمة في العصر الحديث.\n\n"+
"مشكلة البحث:\nما أهمية "+topic+" وتأثيره على المجتمع؟\n\n"+
"الأهداف:\n- فهم مفهوم "+topic+"\n- دراسة تأثيره\n- اقتراح حلول.\n\n"+
"الخاتمة:\nيمثل "+topic+" مجالا مهما للدراسة.";

document.getElementById("research").innerText=result;

}

function summarize(){

let text=document.getElementById("text").value;

let short=text.substring(0,200)+"...";

document.getElementById("summary").innerText=short;

}

</script>

</body>

</html>
