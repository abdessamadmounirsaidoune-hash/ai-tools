<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZStudy AI</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
direction:rtl;
}

header{
background:linear-gradient(135deg,#1e40af,#2563eb);
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin:10px 0;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:15px;
background:#eef2f7;
padding:15px;
border-radius:8px;
white-space:pre-line;
}

</style>

</head>

<body>

<header>
<h1>DZStudy AI</h1>
<p>مساعدة الطلبة الجزائريين بالدراسة والبحوث</p>
</header>

<div class="container">

<div class="card">

<h2>إنشاء بحث</h2>

<input id="topic" placeholder="اكتب موضوع البحث">

<button onclick="createResearch()">إنشاء البحث</button>

<div id="researchResult" class="result"></div>

</div>


<div class="card">

<h2>تلخيص النصوص</h2>

<textarea id="text" rows="5" placeholder="ضع النص هنا"></textarea>

<button onclick="summarize()">تلخيص</button>

<div id="summaryResult" class="result"></div>

</div>


<div class="card">

<h2>حل سؤال</h2>

<textarea id="question" rows="4" placeholder="اكتب السؤال"></textarea>

<button onclick="solve()">حل السؤال</button>

<div id="answerResult" class="result"></div>

</div>

</div>

<script>

function createResearch(){

let topic=document.getElementById("topic").value

let result=document.getElementById("researchResult")

result.innerText="جاري إنشاء البحث..."

setTimeout(()=>{

result.innerText=
"مقدمة:\n"+
"يعتبر موضوع "+topic+" من المواضيع المهمة في العصر الحديث.\n\n"+
"العرض:\n"+
"يتعلق "+topic+" بعدة مجالات علمية واجتماعية ويؤثر بشكل كبير في المجتمع.\n\n"+
"الخاتمة:\n"+
"في النهاية يمكن القول أن "+topic+" يلعب دورًا مهمًا في تطور المجتمعات."

},1200)

}



function summarize(){

let text=document.getElementById("text").value

let result=document.getElementById("summaryResult")

result.innerText="جاري التلخيص..."

setTimeout(()=>{

result.innerText=text.substring(0,200)+" ..."

},1000)

}



function solve(){

let question=document.getElementById("question").value

let result=document.getElementById("answerResult")

result.innerText="جاري حل السؤال..."

setTimeout(()=>{

result.innerText=
"تحليل السؤال:\n"+question+
"\n\nالحل:\n"+
"لحل هذا السؤال يجب تحليل المعطيات واستخدام القواعد العلمية المناسبة."

},1000)

}

</script>

</body>
</html>
