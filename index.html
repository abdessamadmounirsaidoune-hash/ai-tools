<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DZStudy | مساعد الطلبة الجزائريين</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
text-align:center;
}

header{
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
margin:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.icon{
font-size:25px;
color:#2563eb;
margin-bottom:10px;
}

.result{
margin-top:15px;
font-size:17px;
white-space:pre-line;
}

footer{
padding:20px;
color:#777;
}

</style>

</head>

<body>

<header>

<h1>DZStudy</h1>
<p>مساعد الطلبة الجزائريين في البحوث والواجبات</p>

</header>

<div class="container">

<!-- توليد بحث -->

<div class="card">

<div class="icon"><i class="fa-solid fa-lightbulb"></i></div>

<h2>إنشاء فكرة بحث</h2>

<input id="topic" placeholder="مثال: الطاقة الشمسية">

<br>

<button onclick="generateResearch()">توليد فكرة</button>

<div id="research" class="result"></div>

</div>


<!-- تلخيص -->

<div class="card">

<div class="icon"><i class="fa-solid fa-file-lines"></i></div>

<h2>تلخيص النصوص</h2>

<textarea id="text" rows="5" placeholder="ضع النص هنا"></textarea>

<br>

<button onclick="summarize()">تلخيص</button>

<div id="summary" class="result"></div>

</div>


<!-- شرح درس -->

<div class="card">

<div class="icon"><i class="fa-solid fa-book"></i></div>

<h2>شرح درس</h2>

<input id="lesson" placeholder="مثال: قانون أوم">

<br>

<button onclick="explain()">شرح</button>

<div id="explain" class="result"></div>

</div>


<!-- رفع صورة -->

<div class="card">

<div class="icon"><i class="fa-solid fa-image"></i></div>

<h2>إرسال صورة واجب</h2>

<input type="file" accept="image/*">

<p>يمكنك إرسال صورة تمرين أو واجب.</p>

</div>


<!-- تحويل الصوت -->

<div class="card">

<div class="icon"><i class="fa-solid fa-microphone"></i></div>

<h2>تحويل الصوت إلى كتابة</h2>

<button onclick="startVoice()">ابدأ التسجيل</button>

<textarea id="voiceText" rows="4" placeholder="سيظهر النص هنا"></textarea>

</div>


</div>

<footer>

DZStudy 2026

</footer>

<script>

function generateResearch(){

let topic=document.getElementById("topic").value;

let result=

"مقدمة:\n"+
"يعد موضوع "+topic+" من المواضيع المهمة في العصر الحديث.\n\n"+
"مشكلة البحث:\n"+
"ما أهمية "+topic+" وتأثيره على المجتمع؟\n\n"+
"الأهداف:\n"+
"- فهم مفهوم "+topic+"\n"+
"- دراسة تأثيره\n"+
"- اقتراح حلول.\n\n"+
"الخاتمة:\n"+
"يمثل "+topic+" مجالا مهما للدراسة.";

document.getElementById("research").innerText=result;

}

function summarize(){

let text=document.getElementById("text").value;

let short=text.substring(0,200)+"...";

document.getElementById("summary").innerText=short;

}

function explain(){

let lesson=document.getElementById("lesson").value;

let explain=

"شرح مبسط:\n"+
lesson+" هو موضوع مهم في الدراسة ويستخدم لفهم العديد من المفاهيم العلمية.\n\n"+
"لفهمه يجب دراسة المفاهيم الأساسية المرتبطة به.";

document.getElementById("explain").innerText=explain;

}


function startVoice(){

let recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();

recognition.lang="ar";

recognition.start();

recognition.onresult=function(event){

document.getElementById("voiceText").value=event.results[0][0].transcript;

}

}

</script>

</body>

</html>
