<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DZStudy AI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
direction:rtl;
}

header{
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input,textarea{
width:95%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.result{
margin-top:15px;
background:#f1f5f9;
padding:15px;
border-radius:8px;
white-space:pre-line;
}

</style>

</head>

<body>

<header>

<h1>DZStudy</h1>
<p>مساعدة الطلبة الجزائريين بالذكاء الاصطناعي</p>

</header>

<div class="container">


<div class="card">

<h2>إنشاء بحث</h2>

<input id="researchTopic" placeholder="اكتب موضوع البحث">

<button onclick="generateResearch()">إنشاء البحث</button>

<div id="researchResult" class="result"></div>

</div>


<div class="card">

<h2>تلخيص النصوص</h2>

<textarea id="summaryText" rows="5" placeholder="ضع النص هنا"></textarea>

<button onclick="summarizeText()">تلخيص</button>

<div id="summaryResult" class="result"></div>

</div>


<div class="card">

<h2>حل سؤال</h2>

<textarea id="questionText" rows="4" placeholder="اكتب السؤال"></textarea>

<button onclick="solveQuestion()">حل السؤال</button>

<div id="questionResult" class="result"></div>

</div>


</div>

<script>


let API_KEY = localStorage.getItem("HF_KEY");

if(!API_KEY){

API_KEY = prompt("ضع مفتاح HuggingFace API");

localStorage.setItem("HF_KEY",API_KEY);

}


async function generateResearch(){

let topic=document.getElementById("researchTopic").value;

document.getElementById("researchResult").innerText="جاري إنشاء البحث...";

let response=await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-large",
{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
inputs:"اكتب بحثا دراسيا كاملا عن "+topic
})

});

let data=await response.json();

document.getElementById("researchResult").innerText=data[0].generated_text;

}



async function summarizeText(){

let text=document.getElementById("summaryText").value;

document.getElementById("summaryResult").innerText="جاري التلخيص...";

let response=await fetch(
"https://api-inference.huggingface.co/models/facebook/bart-large-cnn",
{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
inputs:text
})

});

let data=await response.json();

document.getElementById("summaryResult").innerText=data[0].summary_text;

}



async function solveQuestion(){

let q=document.getElementById("questionText").value;

document.getElementById("questionResult").innerText="جاري الحل...";

let response=await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-large",
{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
inputs:"حل السؤال التالي واشرحه: "+q
})

});

let data=await response.json();

document.getElementById("questionResult").innerText=data[0].generated_text;

}

</script>

</body>
</html>
