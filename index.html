<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DZStudy AI</title>

<style>

body{
font-family:system-ui;
margin:0;
direction:rtl;
background:#f2f5fb;
}

header{
background:linear-gradient(135deg,#1e4bff,#3a7bff);
color:white;
text-align:center;
padding:35px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
margin-top:10px;
font-size:16px;
}

button{
background:#1e4bff;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
margin-top:12px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#1638c4;
}

.result{
background:#eef2fa;
padding:15px;
border-radius:10px;
margin-top:15px;
white-space:pre-line;
}

.chat-box{
height:300px;
overflow:auto;
background:#eef2fa;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.msg{
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.user{
background:#dce6ff;
}

.ai{
background:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.dark{
background:#121212;
color:white;
}

.dark .card{
background:#1e1e1e;
}

.dark input,
.dark textarea{
background:#2b2b2b;
color:white;
border:none;
}

</style>
</head>

<body>

<div class="topbar">

<h3>DZStudy AI</h3>

<button onclick="toggleDark()">🌙</button>

</div>

<header>

<h1>مساعد الطلبة الجزائريين بالذكاء الاصطناعي</h1>

</header>

<div class="container">

<div class="card">

<h2>💬 الدردشة مع الذكاء الاصطناعي</h2>

<div id="chat" class="chat-box"></div>

<input id="chatInput" placeholder="اكتب سؤالك...">

<button onclick="sendChat()">إرسال</button>

</div>


<div class="card">

<h2>📝 إنشاء بحث</h2>

<input id="topic" placeholder="موضوع البحث">

<button onclick="generateResearch()">إنشاء البحث</button>

<div id="researchResult" class="result"></div>

</div>


<div class="card">

<h2>✂️ تلخيص النصوص</h2>

<textarea id="text" rows="5" placeholder="ضع النص هنا"></textarea>

<button onclick="summarize()">تلخيص</button>

<div id="summaryResult" class="result"></div>

</div>


<div class="card">

<h2>❓ حل سؤال</h2>

<input id="question" placeholder="اكتب السؤال">

<button onclick="answer()">حل السؤال</button>

<div id="answerResult" class="result"></div>

</div>

</div>

<script>

async function askAI(prompt){

let url="https://text.pollinations.ai/"+encodeURIComponent(prompt)

let res=await fetch(url)

let text=await res.text()

return text

}

async function generateResearch(){

let topic=document.getElementById("topic").value

let box=document.getElementById("researchResult")

box.innerText="جاري إنشاء البحث..."

let result=await askAI("اكتب بحثا مدرسيا بمقدمة وعرض وخاتمة حول "+topic)

box.innerText=result

}

async function summarize(){

let text=document.getElementById("text").value

let box=document.getElementById("summaryResult")

box.innerText="جاري التلخيص..."

let result=await askAI("لخص النص التالي:\n"+text)

box.innerText=result

}

async function answer(){

let q=document.getElementById("question").value

let box=document.getElementById("answerResult")

box.innerText="جاري حل السؤال..."

let result=await askAI("أجب عن السؤال التالي للطلاب:\n"+q)

box.innerText=result

}

async function sendChat(){

let input=document.getElementById("chatInput")

let chat=document.getElementById("chat")

let msg=input.value

if(!msg) return

chat.innerHTML+=`<div class="msg user">${msg}</div>`

input.value=""

let reply=await askAI(msg)

chat.innerHTML+=`<div class="msg ai">${reply}</div>`

chat.scrollTop=chat.scrollHeight

}

function toggleDark(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
