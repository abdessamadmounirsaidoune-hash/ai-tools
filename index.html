<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DZStudy AI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
direction:rtl;
}

header{
background:linear-gradient(135deg,#1e40af,#2563eb);
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin:10px 0;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:15px;
background:#eef2f7;
padding:15px;
border-radius:8px;
white-space:pre-line;
min-height:50px;
}

</style>

</head>

<body>

<header>

<h1>DZStudy AI</h1>
<p>مساعدة الطلبة الجزائريين بالذكاء الاصطناعي</p>

</header>

<div class="container">

<div class="card">

<h2>إنشاء بحث</h2>

<input id="topic" placeholder="اكتب موضوع البحث">

<button onclick="generateResearch()">إنشاء البحث</button>

<div id="researchResult" class="result"></div>

</div>


<div class="card">

<h2>تلخيص النصوص</h2>

<textarea id="text" rows="5" placeholder="ضع النص هنا"></textarea>

<button onclick="summarizeText()">تلخيص</button>

<div id="summaryResult" class="result"></div>

</div>


<div class="card">

<h2>حل سؤال</h2>

<textarea id="question" rows="4" placeholder="اكتب السؤال"></textarea>

<button onclick="solveQuestion()">حل السؤال</button>

<div id="answerResult" class="result"></div>

</div>

</div>


<script>

const API_URL="https://api-inference.huggingface.co/models/google/flan-t5-large";

const API_TOKEN="hI_PPmXjzmkhzCGAgbyzzSBAKLoReRAEIzpPc";


async function askAI(prompt){

const response=await fetch(API_URL,{

method:"POST",

headers:{
"Authorization":"Bearer "+API_TOKEN,
"Content-Type":"application/json"
},

body:JSON.stringify({
inputs:prompt
})

})

const data=await response.json()

return data[0].generated_text

}



async function generateResearch(){

let topic=document.getElementById("topic").value

let result=document.getElementById("researchResult")

result.innerText="جاري إنشاء البحث..."

let prompt="اكتب بحثا كاملا مع مقدمة وعرض وخاتمة عن "+topic

let ai=await askAI(prompt)

result.innerText=ai

}



async function summarizeText(){

let text=document.getElementById("text").value

let result=document.getElementById("summaryResult")

result.innerText="جاري التلخيص..."

let prompt="لخص النص التالي: "+text

let ai=await askAI(prompt)

result.innerText=ai

}



async function solveQuestion(){

let question=document.getElementById("question").value

let result=document.getElementById("answerResult")

result.innerText="جاري الحل..."

let prompt="حل السؤال التالي واشرحه: "+question

let ai=await askAI(prompt)

result.innerText=ai

}

</script>

</body>
</html>
